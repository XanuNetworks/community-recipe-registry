recipe_version: "2"
model: Qwen/Qwen3.6-35B-A3B-FP8
runtime: vllm
container: vllm/vllm-openai:cu130-nightly

metadata:
  description: |
    Qwen3.6-35B-A3B-FP8 with MTP speculative decoding (num_speculative_tokens=3) on dual DGX Spark (TP=2).
  maintainer: "@csabakecskemeti"
  model_params: 35B
  model_dtype: fp8
  kv_dtype: fp8

mods:
  - mods/fix-qwen3.6-chat-template

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 2
  gpu_memory_utilization: 0.7
  max_model_len: 262144
  max_num_batched_tokens: 16384
  kv_cache_dtype: fp8
  load_format: fastsafetensors
  attention_backend: flashinfer
  tool_call_parser: qwen3_xml
  distributed_executor_backend: ray
  speculative_config: '{"method":"mtp","num_speculative_tokens":3}'

env:
  VLLM_MARLIN_USE_ATOMIC_ADD: "1"
  FLASHINFER_DISABLE_VERSION_CHECK: "1"

command: |
  vllm serve {model} \
    --host {host} \
    --port {port} \
    --tensor-parallel-size {tensor_parallel} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --kv-cache-dtype {kv_cache_dtype} \
    --load-format {load_format} \
    --attention-backend {attention_backend} \
    --enable-prefix-caching \
    --enable-auto-tool-choice \
    --tool-call-parser {tool_call_parser} \
    --chat-template fixed_chat_template.jinja \
    --distributed-executor-backend {distributed_executor_backend} \
    --speculative-config '{speculative_config}'
